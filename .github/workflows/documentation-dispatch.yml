name: Documentation Dispatch Debug

on:
  workflow_dispatch:

jobs:

  debug:

    runs-on: ubuntu-latest

    steps:

      - name: Show Current GitHub User
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================"
          echo "CURRENT USER"
          echo "========================================"
          gh api user

      - name: Test Repository API Access
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================"
          echo "DOC-TEMPLETE REPOSITORY"
          echo "========================================"

          gh api repos/jijeeshlab/doc-templete

          echo ""
          echo "========================================"
          echo "MAIN BRANCH"
          echo "========================================"

          gh api repos/jijeeshlab/doc-templete/branches/main

      - name: Manual Clone Test
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================"
          echo "MANUAL CLONE TEST"
          echo "========================================"

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Show Files
        run: |
          echo "========================================"
          echo "FILES"
          echo "========================================"

          find template -maxdepth 3 -type f | sort
