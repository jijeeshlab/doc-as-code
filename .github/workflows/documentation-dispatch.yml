name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write

jobs:

  documentation-generation:

    runs-on: ubuntu-latest

    steps:

      - name: Verify New Workflow Loaded
        run: |
          echo "=================================="
          echo "NEW DOCUMENTATION DISPATCH"
          echo "=================================="

      - name: Checkout Current Repository
        uses: actions/checkout@v4

      - name: Show Payload
        run: |
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create doc-request.json
        run: |
          cat > doc-request.json << 'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

          cat doc-request.json

      - name: Show Workspace
        run: |
          pwd
          ls -la

      - name: Complete
        run: |
          echo "Documentation Dispatch Trigger Successful"
