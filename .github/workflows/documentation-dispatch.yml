name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  debug-template-access:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Documentation Repository
        uses: actions/checkout@v4

      - name: Verify PAT Authentication
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================="
          echo "AUTHENTICATED USER"
          echo "========================================="
          gh api user

      - name: Verify Template Repository
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================="
          echo "CHECK DOC-TEMPLETE REPOSITORY"
          echo "========================================="

          gh api repos/jijeeshlab/doc-templete || true

      - name: Verify Template Main Branch
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================="
          echo "CHECK MAIN BRANCH"
          echo "========================================="

          gh api repos/jijeeshlab/doc-templete/branches/main || true

      - name: Repository List
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "========================================="
          echo "ACCESSIBLE REPOSITORIES"
          echo "========================================="

          gh repo list jijeeshlab --limit 100 || true

      - name: Checkout Template Repository
        uses: actions/checkout@v4
        with:
          repository: jijeeshlab/doc-templete
          token: ${{ secrets.CENTRAL_DOCS_TOKEN }}
          ref: main
          path: template
          persist-credentials: false

      - name: Verify Checkout
        run: |
          echo "========================================="
          echo "TEMPLATE CONTENT"
          echo "========================================="

          ls -la template
          find template -maxdepth 3 -type f | sort

      - name: Display Dispatch Payload
        run: |
          echo "========================================="
          echo "DISPATCH PAYLOAD"
          echo "========================================="

          echo '${{ toJson(github.event.client_payload) }}'
