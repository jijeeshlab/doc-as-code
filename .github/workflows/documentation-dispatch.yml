name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  debug-template-access:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Documentation Repository
        uses: actions/checkout@v4

      - name: Show GitHub User
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "=================================="
          echo "AUTHENTICATED USER"
          echo "=================================="
          gh api user

      - name: Verify Repository Access
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "=================================="
          echo "DOC-TEMPLETE"
          echo "=================================="

          gh api repos/jijeeshlab/doc-templete || true

          echo ""

          echo "=================================="
          echo "MAIN BRANCH"
          echo "=================================="

          gh api repos/jijeeshlab/doc-templete/branches/main || true

      - name: Manual Clone Test
        env:
          GIT_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "=================================="
          echo "MANUAL CLONE TEST"
          echo "=================================="

          git clone \
            https://x-access-token:${GIT_TOKEN}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Show Template Content
        run: |
          echo "=================================="
          echo "FILES"
          echo "=================================="

          find template -maxdepth 3 -type f | sort

      - name: Display Dispatch Payload
        run: |
          echo "=================================="
          echo "PAYLOAD"
          echo "=================================="

          echo '${{ toJson(github.event.client_payload) }}'
