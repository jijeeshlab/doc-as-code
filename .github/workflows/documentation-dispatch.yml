name: Documentation Dispatch

on:
  workflow_dispatch:

jobs:

  debug:

    runs-on: ubuntu-latest

    steps:

      - name: Show Authenticated User
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================"
          echo "AUTHENTICATED USER"
          echo "========================================"

          gh api user

      - name: Test Repository Access
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================"
          echo "DOC TEMPLATE REPO"
          echo "========================================"

          gh api repos/jijeeshlab/doc-templete || true

          echo ""
          echo "========================================"
          echo "MAIN BRANCH"
          echo "========================================"

          gh api repos/jijeeshlab/doc-templete/branches/main || true

      - name: Manual Clone Test
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================"
          echo "CLONE TEST"
          echo "========================================"

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Display Files
        run: |

          echo "========================================"
          echo "FILES"
          echo "========================================"

          find template -maxdepth 3 -type f | sort
