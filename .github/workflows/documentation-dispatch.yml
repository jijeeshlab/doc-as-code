name: Documentation Dispatch

on:
  workflow_dispatch:

jobs:

  debug:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Current Repository
        uses: actions/checkout@v4

      - name: Show Current User
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "===================================="
          echo "CURRENT USER"
          echo "===================================="

          gh api user

      - name: Verify Repository Access
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "===================================="
          echo "DOC-TEMPLETE"
          echo "===================================="

          gh api repos/jijeeshlab/doc-templete || true

          echo ""

          echo "===================================="
          echo "MAIN BRANCH"
          echo "===================================="

          gh api repos/jijeeshlab/doc-templete/branches/main || true

      - name: Clone Repository Test
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          echo "===================================="
          echo "CLONE TEST"
          echo "===================================="

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Verify Files
        run: |
          find template -maxdepth 3 -type f | sort
