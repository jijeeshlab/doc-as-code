name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: documentation-generation
  cancel-in-progress: false

jobs:

  documentation-generation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Documentation Repository
        uses: actions/checkout@v4

      - name: Show Payload
        run: |
          echo "=================================="
          echo "DISPATCH PAYLOAD"
          echo "=================================="
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Create doc-request.json
        run: |
          cat > doc-request.json << 'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

          echo "=================================="
          echo "DOC REQUEST CONTENT"
          echo "=================================="

          cat doc-request.json

          echo ""
          echo "=================================="
          echo "CHANGED FILES"
          echo "=================================="

          grep -i changed_files doc-request.json || true

          echo ""
          echo "=================================="
          echo "IMPACTED SERVICES"
          echo "=================================="

          grep -i impacted_services doc-request.json || true

      - name: Clone Actions Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf _actions

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/Actions.git \
            _actions

      - name: Clone Template Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf template

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Clone Source Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf source

          git clone \
            https://x-access-token:${PAT}@github.com/${{ github.event.client_payload.source_repo_full }}.git \
            source

      - name: Show Source Repository Files
        run: |
          echo "=================================="
          echo "SOURCE FILES"
          echo "=================================="

          find source -type f | sort

          echo ""
          echo "=================================="
          echo "PYTHON FILES"
          echo "=================================="

          find source -name "*.py" -type f | sort

          echo ""
          echo "=================================="
          echo "PYTHON SYNTAX CHECK"
          echo "=================================="

          find source -name "*.py" -type f | sort | while read file
          do
            echo ""
            echo "Checking: $file"

            python -m py_compile "$file"

            echo "OK: $file"
          done

          echo ""
          echo "=================================="
          echo "ALL PYTHON FILES VALIDATED"
          echo "=================================="

      - name: Validate Function Detection
        run: |
          echo "=================================="
          echo "FUNCTION DETECTION TEST"
          echo "=================================="

          python - << 'EOF'
          import ast
          from pathlib import Path

          py_files = sorted(Path("source").rglob("*.py"))

          total_functions = 0

          if not py_files:
              print("No Python files found.")
              raise SystemExit(1)

          for file_path in py_files:

              print("")
              print("==================================")
              print(f"FILE: {file_path}")
              print("==================================")

              content = file_path.read_text(
                  encoding="utf-8",
                  errors="ignore"
              )

              tree = ast.parse(content)

              functions = []

              for node in ast.walk(tree):
                  if isinstance(node, ast.FunctionDef):
                      functions.append(node.name)

              print("")
              print("Functions Found:")
              print("==============================")

              if not functions:
                  print("No functions detected")

              for func in functions:
                  print(func)

              print("")
              print(f"Function Count: {len(functions)}")

              total_functions += len(functions)

          print("")
          print("==================================")
          print(f"TOTAL FUNCTIONS DETECTED: {total_functions}")
          print("==================================")
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Verify Agent Files
        run: |
          echo "=================================="
          echo "AGENT FILES"
          echo "=================================="

          find _actions/agents -type f | sort || true

      - name: Generate Agent Based Documentation
        run: |
          echo "=================================="
          echo "RUNNING AGENT GENERATOR"
          echo "=================================="

          python _actions/scripts/generate-agent-docs.py

          echo ""
          echo "=================================="
          echo "GENERATED HLD FILES"
          echo "=================================="

          find docs -name "*hld*.md" -type f -exec ls -lah {} \;

          echo ""
          echo "=================================="
          echo "GENERATED LLD FILES"
          echo "=================================="

          find docs -name "*lld*.md" -type f -exec ls -lah {} \;

          echo ""
          echo "=================================="
          echo "ALL GENERATED HLD FILES"
          echo "=================================="

          find docs -name "*hld*.md" -type f | while read file
          do
            echo ""
            echo "FILE: $file"
            echo "----------------------------------"
            cat "$file"
          done

          echo ""
          echo "=================================="
          echo "ALL GENERATED LLD FILES"
          echo "=================================="

          find docs -name "*lld*.md" -type f | while read file
          do
            echo ""
            echo "FILE: $file"
            echo "----------------------------------"
            cat "$file"
          done

          echo ""
          echo "=================================="
          echo "SEARCHING FOR AGENT CONTEXT"
          echo "=================================="

          grep -R "Agent Context" docs || true

      - name: Validate Documentation Content
        run: |
          echo "=================================="
          echo "DOCUMENT VALIDATION"
          echo "=================================="

          HLD_COUNT=$(find docs -name "*hld*.md" | wc -l)
          LLD_COUNT=$(find docs -name "*lld*.md" | wc -l)

          echo "HLD FILES: $HLD_COUNT"
          echo "LLD FILES: $LLD_COUNT"

          if [ "$HLD_COUNT" -eq 0 ]; then
            echo "No HLD documents generated"
            exit 1
          fi

          if [ "$LLD_COUNT" -eq 0 ]; then
            echo "No LLD documents generated"
            exit 1
          fi

          echo "Documentation validation passed"

      - name: Update Navigation
        run: |
          python _actions/scripts/update-navigation.py

      - name: Show Generated Files
        run: |
          echo "=================================="
          echo "GENERATED FILES"
          echo "=================================="

          find docs -type f | sort

      - name: Cleanup Temporary Files
        run: |
          rm -rf _actions
          rm -rf source
          rm -rf template
          rm -rf generated
          rm -f doc-request.json

      - name: Commit Documentation
        run: |
          echo "=================================="
          echo "COMMIT DOCUMENTATION"
          echo "=================================="

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs

          if [ -f mkdocs.yml ]; then
            git add mkdocs.yml
          fi

          if [ -f documentation-index.yaml ]; then
            git add documentation-index.yaml
          fi

          if git diff --cached --quiet; then
            echo "No documentation changes."
            exit 0
          fi

          git commit -m "Generate documentation using agents"

          for i in 1 2 3
          do
            echo ""
            echo "Push attempt $i"

            git pull --rebase origin main

            if git push origin HEAD:main
            then
              echo "Push successful"
              exit 0
            fi

            echo "Retrying..."
            sleep 5
          done

          exit 1
