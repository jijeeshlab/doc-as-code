name: Documentation Dispatch TEST

on:
  workflow_dispatch:

jobs:

  verify:

    runs-on: ubuntu-latest

    steps:

      - name: Print Workflow Version
        run: |
          echo "=================================="
          echo "NEW WORKFLOW LOADED"
          echo "=================================="

      - name: Show User
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          gh api user

      - name: Show Accessible Repositories
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          gh repo list jijeeshlab --limit 100

      - name: Clone doc-templete
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Show Files
        run: |
          find template -maxdepth 3 -type f | sort
