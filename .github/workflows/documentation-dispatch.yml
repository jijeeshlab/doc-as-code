name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  documentation-generation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Documentation Repository
        uses: actions/checkout@v4

      - name: Verify PAT Authentication
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================="
          echo "AUTHENTICATED USER"
          echo "========================================="

          gh api user

      - name: Verify Template Repository
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================="
          echo "DOC TEMPLATE"
          echo "========================================="

          gh api repos/jijeeshlab/doc-templete

          echo ""

          echo "========================================="
          echo "MAIN BRANCH"
          echo "========================================="

          gh api repos/jijeeshlab/doc-templete/branches/main

      - name: Clone Template Repository
        env:
          GIT_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          echo "========================================="
          echo "CLONING TEMPLATE"
          echo "========================================="

          rm -rf template

          git clone \
            https://x-access-token:${GIT_TOKEN}@github.com/jijeeshlab/doc-templete.git \
            template

          echo ""

          echo "========================================="
          echo "TEMPLATE FILES"
          echo "========================================="

          find template -maxdepth 3 -type f | sort

      - name: Clone Actions Repository
        env:
          GIT_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          rm -rf _actions

          git clone \
            https://x-access-token:${GIT_TOKEN}@github.com/jijeeshlab/Actions.git \
            _actions

      - name: Clone Source Repository
        env:
          GIT_TOKEN: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |

          rm -rf source

          git clone \
            https://x-access-token:${GIT_TOKEN}@github.com/${{ github.event.client_payload.source_repo_full }}.git \
            source

      - name: Display Payload
        run: |

          echo "========================================="
          echo "PAYLOAD"
          echo "========================================="

          echo '${{ toJson(github.event.client_payload) }}'

      - name: Create doc-request.json
        run: |

          cat > doc-request.json <<'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

          cat doc-request.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Show Workspace
        run: |

          echo "========================================="
          echo "WORKSPACE"
          echo "========================================="

          ls -la

          echo ""

          find . -maxdepth 3 -type d | sort
