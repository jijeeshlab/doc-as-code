name: Documentation Dispatch

on:
  repository_dispatch:
    types:
      - documentation_update_requested

  workflow_dispatch:

permissions:
  contents: write

jobs:

  documentation-generation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Documentation Repository
        uses: actions/checkout@v4

      - name: Show Payload
        run: |
          echo "=================================="
          echo "DISPATCH PAYLOAD"
          echo "=================================="
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Create doc-request.json
        run: |
          cat > doc-request.json << 'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

          echo "=================================="
          echo "DOC REQUEST"
          echo "=================================="

          cat doc-request.json

      - name: Clone Actions Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf _actions

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/Actions.git \
            _actions

      - name: Clone Template Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf template

          git clone \
            https://x-access-token:${PAT}@github.com/jijeeshlab/doc-templete.git \
            template

      - name: Clone Source Repository
        env:
          PAT: ${{ secrets.CENTRAL_DOCS_TOKEN }}
        run: |
          rm -rf source

          git clone \
            https://x-access-token:${PAT}@github.com/${{ github.event.client_payload.source_repo_full }}.git \
            source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Verify Agent Files
        run: |
          echo "=================================="
          echo "AGENT FILES"
          echo "=================================="

          find _actions/agents -type f | sort || true

      - name: Generate Agent Based Documentation
        run: |
          python _actions/scripts/generate-agent-docs.py

      - name: Update Navigation
        run: |
          python _actions/scripts/update-navigation.py

      - name: Show Generated Files
        run: |
          echo "=================================="
          echo "GENERATED FILES"
          echo "=================================="

          find docs -type f | sort

      - name: Verify Generated HLD
        run: |
          echo "=================================="
          echo "GENERATED HLD PREVIEW"
          echo "=================================="

          find docs -name "*hld*.md" -exec head -80 {} \;

      - name: Verify Generated LLD
        run: |
          echo "=================================="
          echo "GENERATED LLD PREVIEW"
          echo "=================================="

          find docs -name "*lld*.md" -exec head -80 {} \;

      - name: Verify Agent Context Exists
        run: |
          echo "=================================="
          echo "SEARCHING AGENT CONTEXT"
          echo "=================================="

          grep -R "Agent Context" docs || true

          echo ""
          echo "=================================="
          echo "SEARCHING HLD AGENT"
          echo "=================================="

          grep -R "hld-agent.md" docs || true

          echo ""
          echo "=================================="
          echo "SEARCHING LLD AGENT"
          echo "=================================="

          grep -R "lld-agent.md" docs || true

          echo ""
          echo "=================================="
          echo "SEARCHING DIAGRAM AGENT"
          echo "=================================="

          grep -R "diagram-agent.md" docs || true

      - name: Verify Agent Generator Was Used
        run: |
          echo "=================================="
          echo "SEARCHING FOR AGENT GENERATOR OUTPUT"
          echo "=================================="

          grep -R "Agent-Aware Documentation Generator" docs || true

      - name: Cleanup Temporary Files
        run: |
          rm -rf _actions
          rm -rf source
          rm -rf template
          rm -rf generated
          rm -f doc-request.json

      - name: Commit Documentation
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs

          if [ -f mkdocs.yml ]; then
            git add mkdocs.yml
          fi

          if [ -f documentation-index.yaml ]; then
            git add documentation-index.yaml
          fi

          if git diff --cached --quiet; then
            echo "No documentation changes."
            exit 0
          fi

          git commit -m "Generate documentation using agents"

          git push
